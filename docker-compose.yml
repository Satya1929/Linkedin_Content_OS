services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: linkedin-content-postgres
    environment:
      POSTGRES_DB: content_engine
      POSTGRES_USER: content_engine
      POSTGRES_PASSWORD: content_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: linkedin-content-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
